name: Check

on: [push, pull_request]

jobs:
  publiccode_validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: italia/publiccode-parser-action@v1
        with:
          publiccode: "publiccode.yml"
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v5
  flake8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: stop the build if there are Python syntax errors or undefined names
        run: |
          flake8 ./satosa_oidcop  --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Lint with flake8
        run: |
          flake8 ./satosa_oidcop --count --exit-zero --statistics
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install satosa_oidcop
        run: |
          python -m pip install -e .
      - name: Wait for MongoDB
        run: |
          python -c "
          import time
          import pymongo
          for i in range(30):
              try:
                  pymongo.MongoClient('mongodb://localhost:27017', serverSelectionTimeoutMS=1000).server_info()
                  break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit('MongoDB did not become ready in time')
          "
      - name: pytest
        run: |
          pytest --cov=satosa_oidcop -v --cov-report term --cov-fail-under=90 tests/
